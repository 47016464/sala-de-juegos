<div class="login-container">
  <label>Email:</label>
  <input [(ngModel)]="email" type="text">

  <label>Contraseña:</label>
  <input [(ngModel)]="password" type="password">

  <button (click)="login()">Entrar</button>

  <p *ngIf="error" class="error">{{ error }}</p>

  <div class="quick-login">
    <p>Inicio rápido:</p>
    <button (click)="quickLogin('augusebottazzi@gmail.com','avellaneda')">Usuario 1</button>
    <button (click)="quickLogin('mquintana@fra.utn.edu.ar','123456')">Usuario 2</button>
    <button (click)="quickLogin('jmereles@fra.utn.edu.ar','123456')">Usuario 3</button>
  </div>
</div>
