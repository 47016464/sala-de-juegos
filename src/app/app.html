<h1 class="main-title">Sala De Juegos</h1>

<nav [ngClass]="authService.isLoggedIn() ? 'navbar navbar-logged' : 'navbar'">
  <!-- Si NO está logueado -->
  <div *ngIf="!authService.isLoggedIn()" class="user-profile" routerLink="/registro" routerLinkActive="active">
    <div class="user-profile-inner">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/>
      </svg>
      <p>Registro</p>
    </div>
  </div>

  <div *ngIf="!authService.isLoggedIn()" class="user-profile" routerLink="/login" routerLinkActive="active">
    <div class="user-profile-inner">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="m15.626 11.769a6 6 0 1 0 -7.252 0 9.008 9.008 0 0 0 -5.374 8.231 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 9.008 9.008 0 0 0 -5.374-8.231zm-7.626-4.769a4 4 0 1 1 4 4 4 4 0 0 1 -4-4zm10 14h-12a1 1 0 0 1 -1-1 7 7 0 0 1 14 0 1 1 0 0 1 -1 1z"/>
      </svg>
      <p>Login</p>
    </div>
  </div>

  <!-- Home (siempre visible) -->
  <div class="user-profile" routerLink="/home" routerLinkActive="active">
    <div class="user-profile-inner">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M12 3l9 9h-3v9h-12v-9h-3z"/>
      </svg>
      <p>Home</p>
    </div>
  </div>

  <!-- Quién Soy (siempre visible) -->
  <div class="user-profile" routerLink="/quien-soy" routerLinkActive="active">
    <div class="user-profile-inner">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M12 12a5 5 0 1 0 -5-5 5 5 0 0 0 5 5zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/>
      </svg>
      <p>Quién Soy</p>
    </div>
  </div>

  <!-- Cerrar Sesión (solo logueado) -->
  <div *ngIf="authService.isLoggedIn()" class="user-profile" (click)="authService.logout()">
    <div class="user-profile-inner">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M16 13v-2H7V8l-5 4 5 4v-3zM20 3h-8v2h8v14h-8v2h8a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/>
      </svg>
      <p> Cerrar Sesión ({{ authService.getUserName() }})</p>
    </div>
  </div>
</nav>
<div class="content">
  <router-outlet></router-outlet>
