<div *ngIf="userData">
  <img [src]="userData.avatar_url" width="150">
  <p><strong>Nombre:</strong> {{ userData.name }}</p>
  <p><strong>Usuario:</strong> {{ userData.login }}</p>
  <p><strong>Bio:</strong> {{ userData.bio }}</p>
</div>

<h3>Mi juego propio</h3>
<p>Aquí explico cuál es mi juego, cómo se juega y por qué lo elegí.</p>
